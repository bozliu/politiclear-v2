name: Daily Politiclear Refresh

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy refreshed data to the canonical Vercel app"
        required: false
        default: true
        type: boolean

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Poppler tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Conda dl environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          activate-environment: dl
          auto-activate: false
          channels: conda-forge
          conda-remove-defaults: true

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Refresh and verify official data bundle
        run: npm run prepare:data

      - name: Build web preview bundle
        run: npm run build:vercel

      - name: Upload refreshed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: politiclear-refreshed-dist
          path: |
            data/generated
            dist

  deploy-refresh:
    needs: refresh-data
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Poppler tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Conda dl environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          activate-environment: dl
          auto-activate: false
          channels: conda-forge
          conda-remove-defaults: true

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Deploy refreshed canonical release when config is present
        env:
          POLITICLEAR_EXPECT_CANONICAL_STAGE: live
          POLITICLEAR_EXPECT_DEPLOY_STAGE: live
          VERCEL_CANONICAL_URL: ${{ vars.VERCEL_CANONICAL_URL }}
          VERCEL_PROJECT_SLUG: ${{ vars.VERCEL_PROJECT_SLUG }}
          VERCEL_SCOPE_SLUG: ${{ vars.VERCEL_SCOPE_SLUG }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "${VERCEL_TOKEN:-}" ] && [ -n "${VERCEL_CANONICAL_URL:-}" ] && [ -n "${VERCEL_PROJECT_SLUG:-}" ] && [ -n "${VERCEL_SCOPE_SLUG:-}" ]; then
            npm run deploy:live:fresh-data
          else
            echo "Vercel deployment variables are incomplete, so the workflow refreshed data and build artifacts only."
          fi
