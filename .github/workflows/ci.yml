name: Politiclear CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Conda dl environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          activate-environment: dl
          auto-activate-base: false
          channels: conda-forge

      - name: Install Python ingest dependencies
        run: conda run -n dl python -m pip install pypdf

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Verify generated bundle
        run: npm run verify:bundle

      - name: Build web bundle
        run: npm run build:vercel

      - name: Start API server
        run: |
          npm run api > /tmp/politiclear-api.log 2>&1 &
          echo $! > /tmp/politiclear-api.pid

      - name: Start static web server
        run: |
          conda run -n dl python -m http.server 3000 -d dist > /tmp/politiclear-web.log 2>&1 &
          echo $! > /tmp/politiclear-web.pid

      - name: Wait for local services
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:4000/health >/dev/null 2>&1 && curl -fsS http://127.0.0.1:3000 >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "API log:"
          cat /tmp/politiclear-api.log || true
          echo "Web log:"
          cat /tmp/politiclear-web.log || true
          exit 1

      - name: Validate local API
        run: node scripts/validate_release_api.mjs http://127.0.0.1:3000

      - name: Validate local UI
        run: node scripts/validate_release_ui.mjs http://127.0.0.1:3000

      - name: Stop local services
        if: always()
        run: |
          kill "$(cat /tmp/politiclear-api.pid)" 2>/dev/null || true
          kill "$(cat /tmp/politiclear-web.pid)" 2>/dev/null || true
