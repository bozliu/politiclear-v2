name: Bug report
description: Report a reproducible Politiclear v2 issue.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the issue and the expected behavior.
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page or feature
      description: Example: Home dashboard, My Area, Candidate detail.
    validations:
      required: true
  - type: input
    id: constituency
    attributes:
      label: Constituency or candidate involved
      description: Include the relevant constituency, candidate, or route when possible.
  - type: input
    id: source
    attributes:
      label: Source URL or evidence link
      description: Paste the broken or misleading source URL if one is involved.
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Keep the steps short and concrete.
      placeholder: |
        1. Open ...
        2. Search for ...
        3. Click ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: Add screenshots if the issue is visual, layout-related, or accessibility-related.
